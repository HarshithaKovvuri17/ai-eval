version: '3.8'

services:
  backend:
    build: ./backend
    container_name: ai-eval-backend
    # ports:
    #   - "5000:5000"
    env_file:
      - ./backend/.env
    restart: always
    volumes:
      - ./backend/certificates:/app/certificates

  frontend:
    build: ./frontend
    container_name: ai-eval-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
