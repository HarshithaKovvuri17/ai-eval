# Project identification
sonar.projectKey=neuralcert-ai-eval
sonar.projectName=NeuralCert AI Evaluation System
sonar.projectVersion=1.0

# Source paths
sonar.sources=backend,frontend/src
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/certificates/**,**/assets/**

# Language specific settings
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info,frontend/coverage/lcov.info
sonar.sourceEncoding=UTF-8

# Backend details
sonar.backend.sources=backend
sonar.backend.javascript.node.maxheap=2048

# Frontend details
sonar.frontend.sources=frontend/src
